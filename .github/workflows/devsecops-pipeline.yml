name: "PipelineFortress — SAST + Secrets + SCA + Build + Image Scan + IaC + SBOM + DAST + Deploy"

on:
  push:
    branches:
      - master

env:
  # FIX: VERSION is NO LONGER calculated here in global env
  # Global env runs before checkout so version.txt is not available yet
  # VERSION is now calculated inside build_push job step (see below)
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-juiceshop-devsecops

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1 — SECRETS SCAN (Gitleaks)
  # ════════════════════════════════════════════════════════════
  secrets_scan:
    name: "🔑 Secrets Scan — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 2 — SAST (Semgrep)
  # ════════════════════════════════════════════════════════════
  sast_scan:
    name: "🔍 SAST — Semgrep"
    runs-on: ubuntu-latest
    needs: secrets_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep --break-system-packages

      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/owasp-top-ten" \
            --config "p/jwt" \
            --config "p/xss" \
            --config "p/sql-injection" \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            --severity WARNING \
            . \
            || true

      - name: Enforce SAST gate — fail on ERROR findings
        run: |
          if [ ! -f semgrep-results.sarif ]; then
            echo '{"runs":[{"results":[]}]}' > semgrep-results.sarif
          fi
          if [ ! -s semgrep-results.sarif ]; then
            echo '{"runs":[{"results":[]}]}' > semgrep-results.sarif
          fi
          ERROR_COUNT=$(python3 -c "
          import json, sys
          try:
              with open('semgrep-results.sarif') as f:
                  data = json.load(f)
              errors = [r for r in data.get('runs',[{}])[0].get('results',[]) if r.get('level')=='error']
              print(len(errors))
          except Exception as e:
              sys.stderr.write(f'Warning: {e}\n')
              print(0)
          ")
          echo "Semgrep ERROR findings: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "SAST gate FAILED — $ERROR_COUNT ERROR-level findings."
            exit 1
          fi
          echo "SAST gate passed."

      - name: Upload Semgrep SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.sarif
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 3 — SCA (Trivy Filesystem)
  # ════════════════════════════════════════════════════════════
  sca_scan:
    name: "📦 SCA — Trivy Dependency Scan"
    runs-on: ubuntu-latest
    needs: secrets_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-fs-results.json

      - name: Enforce SCA severity gate
        run: |
          CRITICAL_COUNT=$(python3 -c "
          import json
          try:
              with open('trivy-fs-results.json') as f:
                  data = json.load(f)
              count = sum(
                  1 for result in data.get('Results', [])
                  for v in result.get('Vulnerabilities', [])
                  if v.get('Severity') == 'CRITICAL'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL CVEs in dependencies: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt "5" ]; then
            echo "SCA gate FAILED — $CRITICAL_COUNT CRITICAL CVEs exceed threshold of 5."
            exit 1
          fi
          echo "SCA gate passed. CRITICAL count: $CRITICAL_COUNT"

      - name: Print SCA summary
        if: always()
        run: |
          python3 -c "
          import json
          try:
              with open('trivy-fs-results.json') as f:
                  data = json.load(f)
              print('=== DEPENDENCY VULNERABILITY SUMMARY ===')
              for result in data.get('Results', []):
                  vulns = result.get('Vulnerabilities', [])
                  if vulns:
                      print(f\"Target: {result.get('Target','unknown')}\")
                      for sev in ['CRITICAL','HIGH','MEDIUM','LOW']:
                          c = sum(1 for v in vulns if v.get('Severity') == sev)
                          if c:
                              print(f'  {sev}: {c}')
          except Exception:
              print('Could not parse results')
          "

      - name: Upload Trivy FS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 4 — BUILD & PUSH DOCKER IMAGE
  # VERSION FIX is applied here — step 1 of this job
  # ════════════════════════════════════════════════════════════
  build_push:
    name: "🐳 Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [sast_scan, sca_scan]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── VERSION FIX ────────────────────────────────────────────────────────
      # ROOT CAUSE: version.txt contains "1.0" (float) not "1" (integer)
      # bash $(( )) arithmetic only accepts integers — "1.0 + 1" throws error
      #
      # HOW THIS FIX WORKS:
      # Step 1: Read raw value from version.txt  → e.g. "1.0"
      # Step 2: cut -d'.' -f1 strips the decimal → "1"
      # Step 3: Integer arithmetic adds 1         → "2"
      # Step 4: Write to $GITHUB_ENV             → available as $VERSION in ALL steps below
      #
      # WHY $GITHUB_ENV not global env:
      # Global env: is evaluated BEFORE the runner checks out the repo
      #             so version.txt does not exist yet when global env runs
      # $GITHUB_ENV: is evaluated at runtime AFTER checkout — version.txt exists
      # ──────────────────────────────────────────────────────────────────────
      - name: Calculate next version
        run: |
          RAW=$(cat version.txt)
          INT=$(echo "$RAW" | cut -d'.' -f1)
          VERSION=$(( INT + 1 ))
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version.txt contained: $RAW"
          echo "Stripping decimal: $RAW -> $INT"
          echo "Next version: $VERSION"

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }} .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}

      - name: Save Docker Image as tar
        run: |
          docker save -o juiceshop-image.tar docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}

      - name: Upload Docker Image tar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-tar
          path: juiceshop-image.tar
          retention-days: 1


  # ════════════════════════════════════════════════════════════
  # JOB 5 — CONTAINER IMAGE SCAN (Trivy image)
  # ════════════════════════════════════════════════════════════
  image_scan:
    name: "🛡️ Image Scan — Trivy"
    runs-on: ubuntu-latest
    needs: build_push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      - name: Run Trivy image scan in tarball mode
        uses: aquasecurity/trivy-action@master
        with:
          input: juiceshop-image.tar
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-image-results.json

      - name: Enforce image scan gate — fail on CRITICAL OS CVEs
        run: |
          CRITICAL_COUNT=$(python3 -c "
          import json
          try:
              with open('trivy-image-results.json') as f:
                  data = json.load(f)
              os_types = {'alpine','debian','ubuntu','centos','rhel','node'}
              count = sum(
                  1 for result in data.get('Results', [])
                  if result.get('Type','').lower() in os_types
                  for v in result.get('Vulnerabilities', [])
                  if v.get('Severity') == 'CRITICAL'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL OS/runtime CVEs in image: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "Image scan gate FAILED — $CRITICAL_COUNT CRITICAL OS CVEs."
            echo "Fix: update the FROM line in your Dockerfile to a newer base image."
            exit 1
          fi
          echo "Image scan gate passed."

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 6 — IaC SCAN (Checkov)
  # ════════════════════════════════════════════════════════════
  iac_scan:
    name: "🏗️ IaC Scan — Checkov"
    runs-on: ubuntu-latest
    needs: build_push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov --break-system-packages

      - name: Run Checkov IaC scan on k8s manifests
        run: |
          checkov -d k8s/ \
            --framework kubernetes \
            --output json \
            --output-file checkov-results.json \
            --soft-fail-on MEDIUM,LOW \
            || true

      - name: Enforce IaC gate — fail on CRITICAL or HIGH
        run: |
          FAILED_COUNT=$(python3 -c "
          import json
          try:
              with open('checkov-results.json') as f:
                  data = json.load(f)
              results = data if isinstance(data, list) else [data]
              count = 0
              for r in results:
                  for check in r.get('results', {}).get('failed_checks', []):
                      sev = check.get('check_result', {}).get('severity', '')
                      if sev in ['CRITICAL', 'HIGH']:
                          count += 1
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL/HIGH IaC misconfigurations: $FAILED_COUNT"
          if [ "$FAILED_COUNT" -gt "0" ]; then
            echo "IaC gate FAILED — $FAILED_COUNT CRITICAL/HIGH misconfigs in k8s/"
            exit 1
          fi
          echo "IaC gate passed."

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 7 — SBOM GENERATION (Syft)
  # ════════════════════════════════════════════════════════════
  sbom_generate:
    name: "📋 SBOM — Syft"
    runs-on: ubuntu-latest
    needs: build_push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Load Docker image from tar
        run: docker load -i juiceshop-image.tar

      - name: Generate SBOM in JSON format
        run: |
          syft docker.io/${{ env.DOCKERHUB_REPO }}:${{ needs.build_push.outputs.version || env.VERSION }} -o json > sbom.json || \
          syft juiceshop-image.tar -o json > sbom.json
          python3 -c "
          import json
          with open('sbom.json') as f:
              d = json.load(f)
          print(f'Total packages in SBOM: {len(d.get(\"artifacts\",[]))}')
          "

      - name: Generate SBOM in SPDX format
        run: |
          syft juiceshop-image.tar -o spdx-json > sbom.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom.json
            sbom.spdx.json
          retention-days: 90


  # ════════════════════════════════════════════════════════════
  # JOB 8 — DAST (OWASP ZAP Baseline)
  # ════════════════════════════════════════════════════════════
  dast_scan:
    name: "🕷️ DAST — OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    needs: [image_scan, iac_scan, sbom_generate]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      - name: Load and start Juice Shop for DAST scanning
        run: |
          docker load -i juiceshop-image.tar
          docker run -d \
            --name juiceshop-dast \
            -p 3000:3000 \
            $(docker images --format "{{.Repository}}:{{.Tag}}" | grep juiceshop | head -1)

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Juice Shop to start..."
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "App is ready — HTTP $HTTP_STATUS"
              break
            fi
            echo "Attempt $i — HTTP $HTTP_STATUS — waiting 5s..."
            sleep 5
          done

      - name: Run OWASP ZAP Baseline DAST scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r zap-report.html \
            -J zap-report.json \
            -I \
            || true

      - name: Enforce DAST gate — fail on HIGH alerts
        run: |
          HIGH_COUNT=$(python3 -c "
          import json
          try:
              with open('zap-report.json') as f:
                  data = json.load(f)
              count = sum(
                  1 for alert in data.get('site', [{}])[0].get('alerts', [])
                  if alert.get('riskcode') == '3'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "ZAP HIGH risk alerts: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt "0" ]; then
            echo "DAST gate FAILED — $HIGH_COUNT HIGH risk alerts."
            exit 1
          fi
          echo "DAST gate passed."

      - name: Stop DAST target container
        if: always()
        run: docker stop juiceshop-dast || true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap-report.html
            zap-report.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 9 — DEPLOY & UPDATE MANIFESTS (GitOps Loop)
  # ════════════════════════════════════════════════════════════
  deploy_and_update:
    name: "☸️ Deploy & Update Manifests"
    runs-on: ubuntu-latest
    needs: dast_scan

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Recalculate version here too — each job runs on a fresh runner
      # so GITHUB_ENV values from Job 4 are NOT available here
      - name: Recalculate version
        run: |
          RAW=$(cat version.txt)
          INT=$(echo "$RAW" | cut -d'.' -f1)
          VERSION=$(( INT + 1 ))
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"

      - name: Set Git Config
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USERNAME }}"

      - name: Update deployment.yaml and version.txt
        run: |
          git pull
          sed -i "s|image: .*/gitops-juiceshop-devsecops:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}|" deployment.yaml
          echo ${{ env.VERSION }} > version.txt
          CURRENT_VERSION=$(cat version.txt)
          git add deployment.yaml version.txt
          git commit -m "ci: update image to ${CURRENT_VERSION} — all 8 security gates passed"
          git push

      - name: Pipeline Summary
        if: always()
        run: |
          echo "========================================"
          echo "  PIPELINEFORTRESS — RUN COMPLETE"
          echo "========================================"
          echo "  Image  : ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Gates  : Secrets | SAST | SCA | Build"
          echo "           Image | IaC | SBOM | DAST"
          echo "  Status : All gates passed - ArgoCD syncing"
          echo "========================================"
