# ══════════════════════════════════════════════════════════════════════════════
# FILE    : .github/workflows/devsecops-pipeline.yml
# PROJECT : PipelineFortress — Secure CI/CD for OWASP Juice Shop
# AUTHOR  : Siva Prasad Kusethi | Cloud Security Engineer
# PROGRAM : IIT Roorkee x Futurense — PG Certificate AI/GenAI Cybersecurity
# REPO    : github.com/sivaprasad789-ai/GitOps-Juice-Shop
#
# PIPELINE STAGES (in order of execution):
#   Job 1 → Gitleaks    : Secrets scanning     (runs FIRST — full git history)
#   Job 2 → Semgrep     : SAST                 (parallel with Job 3)
#   Job 3 → Trivy FS    : SCA dependency scan  (parallel with Job 2)
#   Job 4 → Docker      : Build & push image   (after Jobs 2 + 3 pass)
#   Job 5 → Trivy Image : Container CVE scan   (parallel after Job 4)
#   Job 6 → Checkov     : IaC scan k8s/        (parallel after Job 4)
#   Job 7 → Syft        : SBOM generation      (parallel after Job 4)
#   Job 8 → OWASP ZAP  : DAST baseline scan   (after Jobs 5 + 6 + 7 pass)
#   Job 9 → Deploy      : GitOps manifest push (after all gates pass)
# ══════════════════════════════════════════════════════════════════════════════

name: "PipelineFortress — SAST + Secrets + SCA + Build + Image Scan + IaC + SBOM + DAST + Deploy"

on:
  push:
    branches:
      - master

env:
  # Auto-increment version: reads version.txt, adds 1
  # Example: version.txt = "3" → VERSION = "4"
  VERSION: $(( $(cat version.txt) + 1 ))

  # FIX: Docker Hub repo path must NOT contain slashes after the username
  # Correct format: username/reponame   (only one slash)
  # Wrong format  : username/org/repo   (two slashes — Docker Hub doesn't support this)
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-juiceshop-devsecops

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — SECRETS SCANNING (Gitleaks)
  # Runs FIRST — no "needs:" so it starts immediately on push
  # Gate: HARD FAIL if any real secret found anywhere in git history
  # ════════════════════════════════════════════════════════════════════════════
  secrets_scan:
    name: "🔑 Secrets Scan — Gitleaks"
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 = clone full git history (all commits)
      # Required so Gitleaks can scan every commit, not just the latest one
      - name: Checkout Repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Official Gitleaks GitHub Action
      # Scans all files + all commits for 150+ secret patterns
      # GITHUB_TOKEN is auto-provided by GitHub — no manual setup needed
      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Save SARIF report as artifact even if secrets were found (job failed)
      # "if: always()" = run this step regardless of previous step result
      - name: Upload Gitleaks SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — SAST (Semgrep)
  # Starts after Job 1 passes — runs in PARALLEL with Job 3
  # Gate: HARD FAIL on any ERROR-level finding
  #
  # FIX vs original:
  #   - Removed "container: image: semgrep/semgrep" — caused file path issues
  #   - Install Semgrep directly on the runner via pip instead
  #   - Changed "semgrep ci" to "semgrep scan" (ci requires Semgrep Cloud login)
  #   - Added explicit "." target directory (required — without it semgrep writes no output)
  #   - Added file-exists guard before parsing (prevents "No such file" crash)
  #   - Python parser wrapped in try/except (prevents JSON crash if file is empty)
  # ════════════════════════════════════════════════════════════════════════════
  sast_scan:
    name: "🔍 SAST — Semgrep"
    runs-on: ubuntu-latest
    needs: secrets_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Semgrep directly on the Ubuntu runner
      # Avoids container filesystem isolation issues that caused the missing file error
      # "--break-system-packages" required on Ubuntu 24+ for system-wide pip install
      - name: Install Semgrep
        run: pip install semgrep --break-system-packages

      # Run Semgrep scan with six security rulesets
      # "semgrep scan" (not "semgrep ci") — ci requires Semgrep Cloud account/token
      # "--sarif" outputs in SARIF format (standard security report format)
      # "--output semgrep-results.sarif" saves to this file
      # "." at the end = scan current directory (the repo root)
      # "|| true" = don't fail this step even if Semgrep finds issues
      #             we enforce our own gate in the next step
      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/owasp-top-ten" \
            --config "p/jwt" \
            --config "p/xss" \
            --config "p/sql-injection" \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            --severity WARNING \
            . \
            || true

      # Custom severity gate — parse the SARIF file and count ERROR findings
      # Three guards before parsing:
      #   Guard 1: file does not exist → create empty valid SARIF
      #   Guard 2: file exists but is empty → create empty valid SARIF
      #   Guard 3: Python try/except → if JSON is malformed, treat as 0 findings
      - name: Enforce SAST gate — fail on ERROR findings
        run: |
          if [ ! -f semgrep-results.sarif ]; then
            echo "WARNING: semgrep-results.sarif not found — creating empty result"
            echo '{"runs":[{"results":[]}]}' > semgrep-results.sarif
          fi

          if [ ! -s semgrep-results.sarif ]; then
            echo "WARNING: semgrep-results.sarif is empty — creating empty result"
            echo '{"runs":[{"results":[]}]}' > semgrep-results.sarif
          fi

          ERROR_COUNT=$(python3 -c "
          import json, sys
          try:
              with open('semgrep-results.sarif') as f:
                  data = json.load(f)
              errors = [
                  r for r in data.get('runs', [{}])[0].get('results', [])
                  if r.get('level') == 'error'
              ]
              print(len(errors))
          except Exception as e:
              sys.stderr.write(f'SARIF parse warning: {e}\n')
              print(0)
          ")

          echo "Semgrep ERROR findings: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "SAST gate FAILED — $ERROR_COUNT ERROR-level findings detected."
            exit 1
          fi
          echo "SAST gate passed."

      - name: Upload Semgrep SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.sarif
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — SCA — DEPENDENCY SCAN (Trivy Filesystem)
  # Starts after Job 1 passes — runs in PARALLEL with Job 2
  # Gate: FAIL if CRITICAL CVEs in dependencies exceed 5
  # Note: Threshold is 5 (not 0) — Juice Shop intentionally ships vulnerable
  #       packages (node-serialize RCE, vm2 sandbox escape) as learning challenges
  #       For any real production app this threshold MUST be 0
  # ════════════════════════════════════════════════════════════════════════════
  sca_scan:
    name: "📦 SCA — Trivy Dependency Scan"
    runs-on: ubuntu-latest
    needs: secrets_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # scan-type: fs     = filesystem scan (not container image scan)
      # scan-ref: .       = scan from repo root
      # scanners: vuln    = scan for known CVEs in package.json / node_modules
      # severity: CRITICAL,HIGH = report only these two severity levels
      # exit-code: '0'    = never auto-fail — we enforce our own gate below
      # format: json      = machine-readable output for Python parsing
      # output: trivy-fs-results.json = save JSON to this file
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-fs-results.json

      # Custom gate: count only CRITICAL findings across all scan targets
      # Juice Shop threshold = 5 (intentional vulnerable deps)
      # Production threshold = 0
      - name: Enforce SCA severity gate
        run: |
          CRITICAL_COUNT=$(python3 -c "
          import json
          try:
              with open('trivy-fs-results.json') as f:
                  data = json.load(f)
              count = sum(
                  1 for result in data.get('Results', [])
                  for v in result.get('Vulnerabilities', [])
                  if v.get('Severity') == 'CRITICAL'
              )
              print(count)
          except Exception as e:
              print(0)
          ")
          echo "CRITICAL CVEs in dependencies: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt "5" ]; then
            echo "SCA gate FAILED — $CRITICAL_COUNT CRITICAL CVEs exceed threshold of 5."
            exit 1
          fi
          echo "SCA gate passed. CRITICAL count: $CRITICAL_COUNT"

      # Print human-readable breakdown by severity for pipeline logs
      - name: Print SCA summary
        if: always()
        run: |
          python3 -c "
          import json
          try:
              with open('trivy-fs-results.json') as f:
                  data = json.load(f)
              print('=== DEPENDENCY VULNERABILITY SUMMARY ===')
              for result in data.get('Results', []):
                  vulns = result.get('Vulnerabilities', [])
                  if vulns:
                      print(f\"Target: {result.get('Target','unknown')}\")
                      for sev in ['CRITICAL','HIGH','MEDIUM','LOW']:
                          c = sum(1 for v in vulns if v.get('Severity') == sev)
                          if c:
                              print(f'  {sev}: {c}')
          except Exception:
              print('Could not parse trivy-fs-results.json')
          "

      - name: Upload Trivy FS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — BUILD & PUSH DOCKER IMAGE
  # Starts only after BOTH Job 2 (SAST) AND Job 3 (SCA) pass
  # Saves image as .tar and uploads to GitHub artifact storage
  # so Jobs 5, 7, and 8 can download it without re-pulling from Docker Hub
  # ════════════════════════════════════════════════════════════════════════════
  build_push:
    name: "🐳 Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [sast_scan, sca_scan]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Login to Docker Hub using credentials from GitHub Secrets
      # "--password-stdin" pipes the token securely (not visible in process list)
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Build image tagged with auto-incremented VERSION from version.txt
      - name: Build Docker Image
        run: |
          docker build -t docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }} .

      # Push built image to Docker Hub registry
      - name: Push Docker Image to Docker Hub
        run: |
          docker push docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}

      # Save image as .tar file — Jobs 5, 7, 8 run on fresh runners that
      # have no Docker images. Solution: save → upload → they download the .tar
      - name: Save Docker Image as tar
        run: |
          docker save -o juiceshop-image.tar docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}

      # Upload .tar to GitHub artifact storage (shared across all jobs in this run)
      # retention-days: 1 = delete after 1 day (only needed during this pipeline run)
      - name: Upload Docker Image tar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-tar
          path: juiceshop-image.tar
          retention-days: 1


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 — CONTAINER IMAGE SCAN (Trivy image mode)
  # Starts after Job 4 — runs in PARALLEL with Jobs 6 and 7
  # Downloads .tar from Job 4 artifact — scans the exact same image that was built
  # Gate: HARD FAIL on any CRITICAL CVE in OS / runtime layers
  # ════════════════════════════════════════════════════════════════════════════
  image_scan:
    name: "🛡️ Image Scan — Trivy"
    runs-on: ubuntu-latest
    needs: build_push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download the .tar saved and uploaded by Job 4
      # "name" must match exactly what Job 4 uploaded
      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      # Scan the .tar in tarball mode (no registry pull needed)
      # exit-code: '0' = never auto-fail — our custom gate handles this
      - name: Run Trivy image scan in tarball mode
        uses: aquasecurity/trivy-action@master
        with:
          input: juiceshop-image.tar
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-image-results.json

      # Gate: zero tolerance for CRITICAL CVEs in OS/runtime layers
      # os_types filters only OS and Node.js runtime results (not app dependencies)
      # App dependency CVEs are handled by Job 3 with the threshold of 5
      - name: Enforce image scan gate — fail on CRITICAL OS CVEs
        run: |
          CRITICAL_COUNT=$(python3 -c "
          import json
          try:
              with open('trivy-image-results.json') as f:
                  data = json.load(f)
              os_types = {'alpine','debian','ubuntu','centos','rhel','node'}
              count = sum(
                  1 for result in data.get('Results', [])
                  if result.get('Type','').lower() in os_types
                  for v in result.get('Vulnerabilities', [])
                  if v.get('Severity') == 'CRITICAL'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL OS/runtime CVEs in image: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "Image scan gate FAILED — $CRITICAL_COUNT CRITICAL OS CVEs."
            echo "Fix: update the FROM line in your Dockerfile to a newer base image."
            exit 1
          fi
          echo "Image scan gate passed."

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6 — IaC SCANNING (Checkov)
  # Starts after Job 4 — runs in PARALLEL with Jobs 5 and 7
  # Scans all YAML files in k8s/ against CIS Kubernetes benchmarks
  # Gate: FAIL on any CRITICAL or HIGH misconfiguration
  # ════════════════════════════════════════════════════════════════════════════
  iac_scan:
    name: "🏗️ IaC Scan — Checkov"
    runs-on: ubuntu-latest
    needs: build_push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Checkov — Bridgecrew's open-source IaC security scanner
      # "--break-system-packages" required on Ubuntu 24+ for pip system-wide install
      - name: Install Checkov
        run: pip install checkov --break-system-packages

      # Scan k8s/ directory for Kubernetes security misconfigurations
      # -d k8s/               = scan all YAML files in k8s/ directory
      # --framework kubernetes = use Kubernetes-specific CIS benchmark rules
      # --output json         = machine-readable output for our gate step
      # --output-file         = save JSON results to this file
      # --soft-fail-on MEDIUM,LOW = only CRITICAL/HIGH cause hard failure
      # "|| true"             = don't let Checkov exit code stop the pipeline
      - name: Run Checkov IaC scan on k8s manifests
        run: |
          checkov -d k8s/ \
            --framework kubernetes \
            --output json \
            --output-file checkov-results.json \
            --soft-fail-on MEDIUM,LOW \
            || true

      # Parse Checkov JSON and count CRITICAL/HIGH failed checks
      - name: Enforce IaC gate — fail on CRITICAL or HIGH
        run: |
          FAILED_COUNT=$(python3 -c "
          import json
          try:
              with open('checkov-results.json') as f:
                  data = json.load(f)
              results = data if isinstance(data, list) else [data]
              count = 0
              for r in results:
                  for check in r.get('results', {}).get('failed_checks', []):
                      sev = check.get('check_result', {}).get('severity', '')
                      if sev in ['CRITICAL', 'HIGH']:
                          count += 1
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL/HIGH IaC misconfigurations: $FAILED_COUNT"
          if [ "$FAILED_COUNT" -gt "0" ]; then
            echo "IaC gate FAILED — $FAILED_COUNT CRITICAL/HIGH misconfigs in k8s/"
            exit 1
          fi
          echo "IaC gate passed."

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 7 — SBOM GENERATION (Syft)
  # Starts after Job 4 — runs in PARALLEL with Jobs 5 and 6
  # Generates a Software Bill of Materials in two formats:
  #   sbom.json       = Syft native format
  #   sbom.spdx.json  = SPDX industry standard (required for EO 14028 compliance)
  # Gate: NON-BLOCKING — SBOM failure does not block deployment
  # ════════════════════════════════════════════════════════════════════════════
  sbom_generate:
    name: "📋 SBOM — Syft"
    runs-on: ubuntu-latest
    needs: build_push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download the .tar artifact from Job 4
      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      # Install Syft — Anchore's open-source SBOM generator
      # Downloads the latest Syft binary into /usr/local/bin
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # Load the .tar file back into Docker so Syft can access it via Docker API
      - name: Load Docker image from tar
        run: docker load -i juiceshop-image.tar

      # Generate SBOM in Syft native JSON format
      # Lists every OS package and language dependency found in the image
      - name: Generate SBOM in JSON format
        run: |
          syft docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }} -o json > sbom.json
          PACKAGE_COUNT=$(python3 -c "
          import json
          with open('sbom.json') as f:
              d = json.load(f)
          print(len(d.get('artifacts', [])))
          ")
          echo "Total packages in SBOM: $PACKAGE_COUNT"

      # Generate SBOM in SPDX-JSON format
      # SPDX = Software Package Data Exchange — industry standard for supply chain compliance
      - name: Generate SBOM in SPDX format
        run: |
          syft docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }} -o spdx-json > sbom.spdx.json

      # Keep SBOM artifacts for 90 days — longer than other reports for compliance audit trail
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom.json
            sbom.spdx.json
          retention-days: 90


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 8 — DAST — DYNAMIC APPLICATION SECURITY TESTING (OWASP ZAP)
  # Starts only after Jobs 5 + 6 + 7 ALL complete
  # Starts the app in Docker, runs ZAP baseline scan against it, then stops the app
  # Gate: FAIL on any HIGH risk alert (riskcode 3 in ZAP JSON output)
  # ZAP baseline = passive crawl + limited active probes (no auth required)
  # ════════════════════════════════════════════════════════════════════════════
  dast_scan:
    name: "🕷️ DAST — OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    needs: [image_scan, iac_scan, sbom_generate]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download the .tar so we can start the app for ZAP to scan
      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      # Load image and start Juice Shop as a background container
      # -d = detached mode (runs in background)
      # -p 3000:3000 = map host port 3000 to container port 3000
      # ZAP will hit http://localhost:3000 to scan the app
      - name: Load and start Juice Shop for DAST scanning
        run: |
          docker load -i juiceshop-image.tar
          docker run -d \
            --name juiceshop-dast \
            -p 3000:3000 \
            docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}

      # Poll app with curl until it returns HTTP 200
      # Juice Shop takes ~30 seconds to start (Node.js initialization)
      # Try 30 times × 5 seconds = up to 150 seconds total wait time
      - name: Wait for app to be ready
        run: |
          echo "Waiting for Juice Shop to start..."
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "App is ready — HTTP $HTTP_STATUS"
              break
            fi
            echo "Attempt $i — HTTP $HTTP_STATUS — waiting 5s..."
            sleep 5
          done

      # Run ZAP baseline scan against the running Juice Shop
      # --network host        = ZAP container shares host network (reaches localhost:3000)
      # -v $(pwd):/zap/wrk/  = mount working dir so ZAP can write reports there
      # zap-baseline.py      = passive scan script (safe — does not attack the app aggressively)
      # -t                   = target URL
      # -r zap-report.html   = HTML report (human-readable)
      # -J zap-report.json   = JSON report (for our gate parser)
      # -I                   = ignore ZAP's own exit code (we gate manually)
      - name: Run OWASP ZAP Baseline DAST scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r zap-report.html \
            -J zap-report.json \
            -I \
            || true

      # ZAP risk codes: 0=Info, 1=LOW, 2=MEDIUM, 3=HIGH
      # Gate: fail if any HIGH (riskcode=3) alerts are found
      - name: Enforce DAST gate — fail on HIGH alerts
        run: |
          HIGH_COUNT=$(python3 -c "
          import json
          try:
              with open('zap-report.json') as f:
                  data = json.load(f)
              count = sum(
                  1 for alert in data.get('site', [{}])[0].get('alerts', [])
                  if alert.get('riskcode') == '3'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "ZAP HIGH risk alerts: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt "0" ]; then
            echo "DAST gate FAILED — $HIGH_COUNT HIGH risk alerts detected."
            exit 1
          fi
          echo "DAST gate passed."

      # Always stop the DAST container even if ZAP gate failed
      - name: Stop DAST target container
        if: always()
        run: docker stop juiceshop-dast || true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap-report.html
            zap-report.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 9 — DEPLOY & UPDATE MANIFESTS (GitOps Loop)
  # Starts only after Job 8 (DAST) passes — final gate
  # Updates deployment.yaml with new image tag and pushes back to repo
  # ArgoCD watches the repo and auto-syncs the cluster when this commit lands
  # "permissions: contents: write" is required — without it git push returns 403
  # ════════════════════════════════════════════════════════════════════════════
  deploy_and_update:
    name: "☸️ Deploy & Update Manifests"
    runs-on: ubuntu-latest
    needs: dast_scan

    permissions:
      contents: write

    steps:
      # Checkout with GITHUB_TOKEN so git push works (needs write permission above)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Set git author identity for the automated commit
      - name: Set Git Config
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USERNAME }}"

      # GitOps loop:
      # 1. git pull          = avoid merge conflicts from parallel runs
      # 2. sed               = update image tag in deployment.yaml
      # 3. echo VERSION      = write new version number to version.txt
      # 4. git add + commit  = stage and commit both changed files
      # 5. git push          = push to repo → ArgoCD detects change → syncs cluster
      - name: Update deployment.yaml and version.txt
        run: |
          git pull
          sed -i "s|image: ramprasad789/gitops-juiceshop-devsecops:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}|" deployment.yaml
          echo ${{ env.VERSION }} > version.txt
          CURRENT_VERSION=$(cat version.txt)
          git add deployment.yaml version.txt
          git commit -m "ci: update image to ${CURRENT_VERSION} — all 8 security gates passed"
          git push

      # Print final summary — always runs even if git push above failed
      - name: Pipeline Summary
        if: always()
        run: |
          echo "========================================"
          echo "  PIPELINEFORTRESS — RUN COMPLETE"
          echo "========================================"
          echo "  Image  : ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Gates  : Secrets | SAST | SCA | Build"
          echo "           Image | IaC | SBOM | DAST"
          echo "  Status : All gates passed - ArgoCD syncing"
          echo "========================================"
